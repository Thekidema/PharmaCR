<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head}"></head>
    <body>
        <header th:replace="~{general/fragmentos :: header}"></header>
        <section th:replace="~{general/fragmentos :: mostrarToast}"></section>

        <section class="py-4">
            <div class="container">
                <div class="row">
                    <div class="col-md-8 offset-md-2">

                        <h2><i class="fas fa-plus"></i> [[#{inventario.salida.titulo}]]</h2>

                        <form th:action="@{/inventario/salida/agregar}" th:object="${salida}" method="post" class="mt-3">

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">[[#{medicamento.nombre}]] *</label>
                                    <select class="form-select" th:field="*{medicamento.idMedicamento}" required>
                                        <option value="">-- Seleccione --</option>
                                        <option th:each="m : ${medicamentos}"
                                                th:value="${m.idMedicamento}"
                                                th:text="${m.codigo + ' — ' + m.nombre + ' (stock: ' + m.stockActual + ')'}"></option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">[[#{inventario.tipo}]] *</label>
                                    <select class="form-select" th:field="*{tipo}" required>
                                        <option value="">-- Seleccione --</option>
                                        <option value="Ajuste">Ajuste</option>
                                        <option value="Devolucion">Devolución</option>
                                        <option value="Perdida">Pérdida</option>
                                    </select>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">[[#{inventario.cantidad}]] *</label>
                                    <input type="number" class="form-control" th:field="*{cantidad}"
                                           placeholder="Ej: 2" min="1" required/>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">[[#{inventario.registradoPor}]] *</label>
                                    <select class="form-select" th:field="*{usuario.idUsuario}" required>
                                        <option value="">-- Seleccione --</option>
                                        <option th:each="u : ${usuarios}"
                                                th:value="${u.idUsuario}"
                                                th:text="${u.username}"></option>
                                    </select>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">[[#{inventario.motivo}]] *</label>
                                <input type="text" class="form-control" th:field="*{motivo}"
                                       placeholder="Ej: Ajuste por diferencia en conteo físico" maxlength="300" required/>
                            </div>

                            <div class="mt-4">
                                <button type="submit" class="btn btn-primary me-2">
                                    <i class="fas fa-save"></i> [[#{accion.agregar}]]
                                </button>
                                <a th:href="@{/inventario/salidas}" class="btn btn-secondary">
                                    <i class="fas fa-arrow-left"></i> [[#{accion.cancelar}]]
                                </a>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </section>

        <footer th:replace="~{general/fragmentos :: footer}"></footer>
    </body>
</html>
