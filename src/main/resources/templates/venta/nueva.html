<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head}"></head>
    <body>
        <header th:replace="~{general/fragmentos :: header}"></header>
        <section th:replace="~{general/fragmentos :: mostrarToast}"></section>

        <section class="py-4">
            <div class="container">
                <div class="row">
                    <div class="col-md-8 offset-md-2">

                        <h2><i class="fas fa-cash-register"></i> [[#{venta.nueva.titulo}]]</h2>

                        <form th:action="@{/venta/guardar}" method="post" class="mt-3">

                            <div class="mb-3">
                                <label class="form-label fw-bold">[[#{venta.usuario}]] *</label>
                                <select class="form-select" name="idUsuario" required>
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="u : ${usuarios}"
                                            th:value="${u.idUsuario}"
                                            th:text="${u.username + ' — ' + u.nombre + ' ' + u.apellidos}"></option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">[[#{medicamento.nombre}]] *</label>
                                <select class="form-select" name="idMedicamento" required>
                                    <option value="">-- Seleccione --</option>
                                    <option th:each="m : ${medicamentos}"
                                            th:value="${m.idMedicamento}"
                                            th:text="${m.codigo + ' — ' + m.nombre + ' (₡' + m.precio + ', stock: ' + m.stockActual + ')'}"></option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">[[#{inventario.cantidad}]] *</label>
                                <input type="number" class="form-control" name="cantidad"
                                       placeholder="Ej: 2" min="1" required/>
                            </div>

                            <div class="mt-4">
                                <button type="submit" class="btn btn-primary me-2">
                                    <i class="fas fa-save"></i> [[#{venta.registrar}]]
                                </button>
                                <a th:href="@{/venta/listado}" class="btn btn-secondary">
                                    <i class="fas fa-arrow-left"></i> [[#{accion.cancelar}]]
                                </a>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </section>

        <footer th:replace="~{general/fragmentos :: footer}"></footer>
    </body>
</html>
