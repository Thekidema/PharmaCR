spring.application.name=pharmacr
server.port=92
logging.pattern.dateformat=dd HH:mm
logging.level.root=INFO
spring.main.banner-mode=off
spring.thymeleaf.cache=false
#la sesión se rastrea solo por cookie 
server.servlet.session.tracking-modes=cookie

spring.datasource.url=jdbc:mysql://localhost:3306/pharmacr?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=usuario_pharmacr
spring.datasource.password=PharmaCR_Clave.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
